<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FRIDAY - JARVIS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      overflow: hidden;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { scrollbar-width: none; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 20px; } }
    @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    
    .pulse { animation: pulse 2s infinite; }
    .wave { animation: wave 0.5s ease-in-out infinite; }
    .blink { animation: blink 4s infinite; }
    .slide-in { animation: slideIn 0.3s ease-out; }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    
    .mic-btn { transition: all 0.2s ease; }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn.listening { 
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
    }
    
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent 0%, rgba(10,10,15,0.95) 20%);
    }
    
    .toast {
      animation: slideIn 0.3s ease-out;
    }
    
    .typing-dot {
      animation: pulse 1s infinite;
    }
  </style>
</head>
<body>
  <div id="app" class="h-full flex flex-col"></div>

  <script>
    // ====== CONFIG ======
    // Use your server URL (change this to your tunnel URL)
    const API = 'https://ff2eba331761e9f3-152-59-63-68.serveousercontent.com';
    const SESSION_ID = localStorage.getItem('friday_session') || 'sess_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('friday_session', SESSION_ID);
    
    const SYSTEM_PROMPT = `You are FRIDAY - Tony Stark's female AI assistant.
- Be conversational, warm, intelligent, helpful
- Keep responses under 80 words unless code
- Use minimal tokens
- Speak naturally`;

    // ====== STATE ======
    const state = {
      messages: JSON.parse(localStorage.getItem('friday_messages') || '[]'),
      input: '',
      isListening: false,
      isSpeaking: false,
      isStreaming: false,
      isMuted: false,
      isConnected: false,
      totalTokens: parseInt(localStorage.getItem('friday_tokens') || '0'),
      toasts: [],
      online: navigator.onLine
    };

    // ====== UTILS ======
    function saveMessages() {
      localStorage.setItem('friday_messages', JSON.stringify(state.messages.slice(-50)));
    }
    
    function saveTokens() {
      localStorage.setItem('friday_tokens', state.totalTokens);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function showToast(message, type = 'info') {
      const id = Date.now();
      state.toasts.push({ id, message, type });
      render();
      setTimeout(() => {
        state.toasts = state.toasts.filter(t => t.id !== id);
        render();
      }, 4000);
    }

    // ====== SPEECH RECOGNITION ======
    let recognition = null;
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      
      recognition.onresult = (e) => {
        state.input = Array.from(e.results).map(r => r[0].transcript).join('');
        render();
        if (e.results[e.results.length - 1].isFinal) {
          if (state.input.trim()) sendMessage();
        }
      };
      
      recognition.onend = () => {
        state.isListening = false;
        render();
        if (state.input.trim() && !state.messages.slice(-1)[0]?.content?.includes(state.input)) {
          sendMessage();
        }
      };
      
      recognition.onerror = (e) => {
        state.isListening = false;
        if (e.error !== 'no-speech') {
          showToast('Voice error: ' + e.error, 'error');
        }
        render();
      };
    }

    function toggleVoice() {
      if (!recognition) {
        showToast('Voice not supported in this browser. Use Chrome.', 'error');
        return;
      }
      if (state.isListening) {
        recognition.stop();
        state.isListening = false;
      } else {
        state.input = '';
        recognition.start();
        state.isListening = true;
        showToast('Listening... Speak now', 'info');
      }
      render();
    }

    // ====== TEXT TO SPEECH ======
    function speak(text) {
      if (state.isMuted || !text) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1.1;
      utterance.pitch = 1.1;
      utterance.onstart = () => { state.isSpeaking = true; render(); };
      utterance.onend = () => { state.isSpeaking = false; render(); };
      utterance.onerror = () => { state.isSpeaking = false; render(); };
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeaking() {
      window.speechSynthesis.cancel();
      state.isSpeaking = false;
      render();
    }

    // ====== SEND MESSAGE ======
    async function sendMessage() {
      if (!state.input.trim() || state.isStreaming) return;
      
      const userMsg = { role: 'user', content: state.input.trim() };
      state.messages.push(userMsg);
      state.input = '';
      state.isStreaming = true;
      saveMessages();
      render();
      
      try {
        const res = await fetch(`${API}/api/chat`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Session-Id': SESSION_ID
          },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              ...state.messages.map(m => ({ role: m.role, content: m.content }))
            ]
          })
        });
        
        if (!res.ok) throw new Error('HTTP ' + res.status);
        
        const data = await res.json();
        
        if (data.choices?.[0]?.message?.content) {
          const content = data.choices[0].message.content;
          state.messages.push({ role: 'assistant', content });
          saveMessages();
          
          if (data.usage?.total_tokens) {
            state.totalTokens += data.usage.total_tokens;
            saveTokens();
          }
          
          if (data.demo) {
            showToast('Demo mode - Configure AI API key for full responses', 'info');
          } else {
            showToast('Response ready!', 'success');
          }
          
          const textOnly = content.replace(/```[\s\S]*?```/g, '');
          speak(textOnly);
        }
        
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
        state.messages.push({ 
          role: 'assistant', 
          content: 'Connection error. Please try again.' 
        });
        saveMessages();
      }
      
      state.isStreaming = false;
      render();
    }

    // ====== RENDER ======
    function render() {
      document.getElementById('app').innerHTML = `
        <!-- Header -->
        <header class="px-4 py-3 flex items-center justify-between border-b border-gray-800 bg-black/50" style="backdrop-filter: blur(10px);">
          <div class="flex items-center gap-3">
            <div class="relative">
              <div class="w-12 h-12 rounded-full ${state.isSpeaking ? 'bg-green-500' : state.isConnected ? 'bg-cyan-500' : 'bg-gray-600'} flex items-center justify-center">
                <span class="text-xl ${state.isSpeaking ? 'pulse' : ''}">🤖</span>
              </div>
              ${state.isSpeaking ? '<div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-black"></div>' : ''}
            </div>
            <div>
              <h1 class="text-lg font-bold text-white">FRIDAY</h1>
              <p class="text-xs ${state.isConnected ? 'text-green-400' : 'text-gray-500'}">
                ${state.isSpeaking ? 'Speaking...' : state.isListening ? 'Listening...' : state.isConnected ? 'Connected' : 'Demo Mode'}
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <div class="text-xs px-2 py-1 rounded bg-gray-900">
              <span class="text-gray-500">TKN:</span>
              <span class="text-cyan-400 font-mono font-bold">${state.totalTokens}</span>
            </div>
            <button onclick="state.isMuted = !state.isMuted; render()" 
              class="p-2 rounded-lg ${state.isMuted ? 'bg-red-500/20 text-red-400' : 'hover:bg-gray-800 text-gray-400'}">
              ${state.isMuted ? '🔇' : '🔊'}
            </button>
            <button onclick="clearChat()" class="p-2 rounded-lg hover:bg-gray-800 text-gray-400" title="Clear chat">
              🗑️
            </button>
          </div>
        </header>

        <!-- Toasts -->
        <div class="fixed top-16 left-4 right-4 z-50 space-y-2">
          ${state.toasts.map(t => `
            <div class="toast px-4 py-3 rounded-lg text-sm font-medium shadow-lg ${
              t.type === 'error' ? 'bg-red-600 text-white' :
              t.type === 'success' ? 'bg-green-600 text-white' :
              'bg-cyan-600 text-white'
            }">
              ${t.type === 'error' ? '❌' : t.type === 'success' ? '✅' : 'ℹ️'} ${escapeHtml(t.message)}
            </div>
          `).join('')}
        </div>

        <!-- Messages -->
        <main class="flex-1 overflow-y-auto p-4 pb-32 scrollbar-hide">
          ${state.messages.length === 0 ? `
            <div class="h-full flex flex-col items-center justify-center text-center">
              <div class="text-7xl mb-6 fade-in ${state.isSpeaking ? 'pulse' : ''}">🤖</div>
              <h2 class="text-2xl text-white font-light mb-2">Hey Boss!</h2>
              <p class="text-gray-500 max-w-xs mb-6">I'm FRIDAY, your AI assistant. Tap the mic and speak, or type your message.</p>
              <div class="flex flex-wrap justify-center gap-2">
                <span class="px-3 py-1.5 rounded-full bg-cyan-500/10 text-cyan-400 text-xs">🎤 Voice Ready</span>
                <span class="px-3 py-1.5 rounded-full bg-green-500/10 text-green-400 text-xs">⚡ Fast</span>
                <span class="px-3 py-1.5 rounded-full bg-purple-500/10 text-purple-400 text-xs">🔒 Private</span>
              </div>
            </div>
          ` : ''}

          ${state.messages.map((msg, idx) => `
            <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-3 slide-in">
              <div class="max-w-[85%] rounded-2xl px-4 py-3 ${
                msg.role === 'user' 
                  ? 'bg-gradient-to-r from-cyan-600 to-blue-600 text-white rounded-br-sm' 
                  : 'bg-gray-800 text-gray-100 rounded-bl-sm border border-gray-700'
              }">
                <p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(msg.content)}</p>
              </div>
            </div>
          `).join('')}

          ${state.isStreaming ? `
            <div class="flex justify-start mb-3 slide-in">
              <div class="bg-gray-800 rounded-2xl rounded-bl-sm px-4 py-3 border border-gray-700">
                <div class="flex gap-1">
                  <span class="w-2 h-2 bg-cyan-400 rounded-full typing-dot"></span>
                  <span class="w-2 h-2 bg-cyan-400 rounded-full typing-dot" style="animation-delay: 0.2s"></span>
                  <span class="w-2 h-2 bg-cyan-400 rounded-full typing-dot" style="animation-delay: 0.4s"></span>
                </div>
              </div>
            </div>
          ` : ''}
        </main>

        <!-- Voice Indicator -->
        ${state.isListening ? `
          <div class="px-4 py-2 bg-red-500/20 border-t border-red-500/30">
            <div class="flex items-center justify-center gap-3">
              <div class="flex gap-0.5 items-end h-5">
                <span class="w-1 bg-red-500 rounded-full wave"></span>
                <span class="w-1 bg-red-500 rounded-full wave" style="animation-delay: 0.1s"></span>
                <span class="w-1 bg-red-500 rounded-full wave" style="animation-delay: 0.2s"></span>
                <span class="w-1 bg-red-500 rounded-full wave" style="animation-delay: 0.3s"></span>
                <span class="w-1 bg-red-500 rounded-full wave" style="animation-delay: 0.4s"></span>
              </div>
              <span class="text-sm text-red-400 font-medium">Listening... Tap mic to stop</span>
            </div>
          </div>
        ` : ''}

        <!-- Input -->
        <div class="input-area">
          <div class="flex items-end gap-3 max-w-3xl mx-auto">
            <textarea
              id="input"
              rows="1"
              placeholder="Ask FRIDAY anything..."
              class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-white placeholder-gray-500 focus:border-cyan-500 focus:outline-none resize-none"
              style="min-height: 50px; max-height: 120px;"
              oninput="handleInput(this)"
              onkeydown="handleKeyDown(event)"
            >${state.input}</textarea>
            
            <button onclick="toggleVoice()" 
              class="mic-btn w-14 h-14 rounded-full flex items-center justify-center text-2xl ${state.isListening ? 'listening' : 'bg-gradient-to-r from-cyan-600 to-blue-600 hover:shadow-lg'}">
              ${state.isListening ? '🔴' : '🎤'}
            </button>
            
            <button onclick="sendMessage()" 
              ${!state.input.trim() || state.isStreaming ? 'disabled' : ''}
              class="mic-btn w-14 h-14 rounded-full bg-gradient-to-r from-green-500 to-emerald-500 ${!state.input.trim() || state.isStreaming ? 'opacity-50' : 'hover:shadow-lg'}">
              ➤
            </button>
          </div>
        </div>
      `;
    }

    function handleInput(el) {
      state.input = el.value;
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      render();
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function clearChat() {
      if (confirm('Clear all messages?')) {
        state.messages = [];
        localStorage.removeItem('friday_messages');
        render();
      }
    }

    // ====== INIT ======
    window.addEventListener('online', () => { state.online = true; render(); });
    window.addEventListener('offline', () => { state.online = false; render(); });

    render();

    // Test connection
    setTimeout(async () => {
      try {
        const res = await fetch(`${API}/api/chat`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Session-Id': SESSION_ID
          },
          body: JSON.stringify({ messages: [{ role: 'user', content: 'ping' }] })
        });
        const data = await res.json();
        state.isConnected = data.status === 'ok';
        if (data.demo) {
          showToast('Running in demo mode', 'info');
        } else {
          showToast('Connected to ' + (data.ai || 'AI'), 'success');
        }
      } catch (e) {
        showToast('Connection issue', 'error');
      }
      render();
    }, 1000);
  </script>
</body>
</html>
