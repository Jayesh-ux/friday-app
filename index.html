<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FRIDAY - JARVIS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0a0a0f 0%, #0d1117 50%, #0a0a0f 100%);
      color: #e0e0e0;
      overflow: hidden;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { scrollbar-width: none; }
    
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    
    @keyframes voice-wave {
      0%, 100% { height: 4px; }
      50% { height: 20px; }
    }
    
    @keyframes typing {
      0%, 100% { opacity: 0.5; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
      50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.6); }
    }
    
    .pulse-ring { animation: pulse-ring 1.5s ease-out infinite; }
    .voice-wave { animation: voice-wave 0.5s ease-in-out infinite; }
    .typing-dot { animation: typing 1s ease-in-out infinite; }
    .glow { animation: glow 2s ease-in-out infinite; }
    
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.95) 20%);
    }
    
    .avatar-ring {
      position: relative;
    }
    
    .avatar-ring::before,
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid rgba(0, 212, 255, 0.3);
    }
    
    .avatar-ring::after {
      animation: pulse-ring 2s ease-out infinite;
    }
    
    .message-appear {
      animation: messageIn 0.3s ease-out;
    }
    
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app" class="h-full flex flex-col"></div>

  <script>
    // ====== CONFIG ======
    const API_BASE = window.location.origin;
    const SYSTEM_PROMPT = `You are FRIDAY - Tony Stark's female AI assistant.
- Be conversational, warm, and helpful
- Keep responses under 50 words unless code
- Use minimal tokens
- Speak naturally like a real assistant`;

    // ====== STATE ======
    const state = {
      messages: [],
      input: '',
      isListening: false,
      isSpeaking: false,
      isStreaming: false,
      isMuted: false,
      totalTokens: parseInt(localStorage.getItem('friday_tokens') || '0'),
      currentResponse: '',
      online: navigator.onLine
    };

    // ====== SPEECH RECOGNITION ======
    let recognition = null;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      
      recognition.onresult = (e) => {
        state.input = Array.from(e.results).map(r => r[0].transcript).join('');
        render();
        if (e.results[e.results.length - 1].isFinal) {
          sendMessage();
        }
      };
      
      recognition.onend = () => {
        state.isListening = false;
        render();
        if (state.input.trim()) sendMessage();
      };
      
      recognition.onerror = (e) => {
        state.isListening = false;
        render();
      };
    }

    // ====== TEXT TO SPEECH ======
    function speak(text) {
      if (state.isMuted || !text) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1.1;
      utterance.pitch = 1.1;
      utterance.onstart = () => { state.isSpeaking = true; render(); };
      utterance.onend = () => { state.isSpeaking = false; render(); };
      utterance.onerror = () => { state.isSpeaking = false; render(); };
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeaking() {
      window.speechSynthesis.cancel();
      state.isSpeaking = false;
      render();
    }

    // ====== TOGGLE VOICE ======
    function toggleVoice() {
      if (!recognition) {
        alert('Voice not supported. Use Chrome browser.');
        return;
      }
      if (state.isListening) {
        recognition.stop();
        state.isListening = false;
      } else {
        recognition.start();
        state.isListening = true;
      }
      render();
    }

    // ====== SEND MESSAGE ======
    async function sendMessage() {
      if (!state.input.trim() || state.isStreaming) return;
      
      console.log('FRIDAY: Sending message...');
      
      const userMsg = { role: 'user', content: state.input.trim() };
      state.messages.push(userMsg);
      state.input = '';
      state.isStreaming = true;
      render();
      
      try {
        console.log('FRIDAY: Calling API at', `${API_BASE}/api/chat`);
        
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              ...state.messages.map(m => ({ role: m.role, content: m.content }))
            ]
          })
        });
        
        console.log('FRIDAY: Response status:', res.status);
        
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        
        const data = await res.json();
        console.log('FRIDAY: Response data:', data);
        
        if (data.choices?.[0]?.message?.content) {
          const content = data.choices[0].message.content;
          state.messages.push({ role: 'assistant', content });
          
          if (data.usage?.total_tokens) {
            state.totalTokens += data.usage.total_tokens;
            localStorage.setItem('friday_tokens', state.totalTokens);
          }
          
          const textOnly = content.replace(/```[\s\S]*?```/g, '');
          speak(textOnly);
        } else if (data.error) {
          state.messages.push({ role: 'assistant', content: `Error: ${data.error}` });
        }
        
      } catch (err) {
        console.error('FRIDAY: Error:', err);
        state.messages.push({ 
          role: 'assistant', 
          content: `Connection error: ${err.message}. Check console for details.` 
        });
      }
      
      state.isStreaming = false;
      render();
    }
      
      state.isStreaming = false;
      state.currentResponse = '';
      render();
    }

    // ====== RENDER ======
    function render() {
      document.getElementById('app').innerHTML = `
        <!-- Header -->
        <header class="glass px-4 py-3 flex items-center justify-between border-b border-cyan-900/30 z-50">
          <div class="flex items-center gap-3">
            <div class="avatar-ring ${state.isSpeaking ? 'glow' : ''}">
              <div class="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                <span class="text-xl">🤖</span>
              </div>
            </div>
            <div>
              <h1 class="text-lg font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">FRIDAY</h1>
              <p class="text-xs text-gray-500 flex items-center gap-1">
                <span class="w-2 h-2 rounded-full ${state.online ? 'bg-green-500' : 'bg-red-500'}"></span>
                ${state.online ? 'Online' : 'Offline'}
              </p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="text-xs px-2 py-1 rounded-full bg-black/30">
              <span class="text-gray-400">TKN:</span>
              <span class="text-cyan-400 font-mono font-bold">${state.totalTokens}</span>
            </div>
            <button onclick="state.isMuted = !state.isMuted; render()" 
              class="p-2 rounded-lg ${state.isMuted ? 'bg-red-500/20 text-red-400' : 'hover:bg-gray-800 text-gray-400'}">
              ${state.isMuted ? '🔇' : '🔊'}
            </button>
          </div>
        </header>

        <!-- Messages -->
        <main class="flex-1 overflow-y-auto p-4 pb-32 scrollbar-hide">
          ${state.messages.length === 0 ? `
            <div class="h-full flex flex-col items-center justify-center text-center">
              <div class="text-6xl mb-4 ${state.isSpeaking ? 'animate-bounce' : ''}">🤖</div>
              <h2 class="text-2xl text-gray-200 font-light">Hey Boss!</h2>
              <p class="text-sm text-gray-500 mt-2 max-w-xs">
                I'm FRIDAY, your AI assistant. Tap the mic and speak, or type your question.
              </p>
              <div class="mt-6 flex gap-2">
                <span class="px-3 py-1 rounded-full bg-cyan-500/10 text-cyan-400 text-xs">🎤 Voice</span>
                <span class="px-3 py-1 rounded-full bg-green-500/10 text-green-400 text-xs">⚡ Fast</span>
                <span class="px-3 py-1 rounded-full bg-purple-500/10 text-purple-400 text-xs">🔒 Private</span>
              </div>
            </div>
          ` : ''}

          ${state.messages.map((msg, idx) => `
            <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-3 message-appear">
              <div class="max-w-[85%] rounded-2xl px-4 py-3 ${msg.role === 'user' 
                ? 'bg-gradient-to-r from-cyan-600 to-blue-600 text-white' 
                : 'bg-[#1a1a2e] border border-gray-800'}">
                <p class="text-sm whitespace-pre-wrap">${escapeHtml(msg.content)}</p>
              </div>
            </div>
          `).join('')}

          ${state.isStreaming && state.currentResponse ? `
            <div class="flex justify-start mb-3">
              <div class="max-w-[85%] rounded-2xl px-4 py-3 bg-[#1a1a2e] border border-gray-800">
                <p class="text-sm whitespace-pre-wrap">${escapeHtml(state.currentResponse)}<span class="animate-pulse">|</span></p>
              </div>
            </div>
          ` : ''}

          ${state.isStreaming && !state.currentResponse ? `
            <div class="flex justify-start mb-3">
              <div class="bg-[#1a1a2e] border border-gray-800 rounded-2xl px-4 py-3">
                <div class="flex gap-1">
                  <span class="w-2 h-2 bg-cyan-400 rounded-full typing-dot"></span>
                  <span class="w-2 h-2 bg-cyan-400 rounded-full typing-dot" style="animation-delay: 0.2s"></span>
                  <span class="w-2 h-2 bg-cyan-400 rounded-full typing-dot" style="animation-delay: 0.4s"></span>
                </div>
              </div>
            </div>
          ` : ''}
        </main>

        <!-- Voice Status -->
        ${state.isListening ? `
          <div class="px-4 py-2 bg-red-500/10 border-t border-red-500/30">
            <div class="flex items-center justify-center gap-3">
              <div class="flex gap-0.5 items-end h-4">
                <span class="w-1 bg-red-500 rounded-full voice-wave"></span>
                <span class="w-1 bg-red-500 rounded-full voice-wave" style="animation-delay: 0.1s"></span>
                <span class="w-1 bg-red-500 rounded-full voice-wave" style="animation-delay: 0.2s"></span>
                <span class="w-1 bg-red-500 rounded-full voice-wave" style="animation-delay: 0.3s"></span>
                <span class="w-1 bg-red-500 rounded-full voice-wave" style="animation-delay: 0.4s"></span>
              </div>
              <span class="text-sm text-red-400 font-medium">Listening...</span>
            </div>
          </div>
        ` : ''}

        <!-- Input -->
        <div class="input-area">
          <div class="flex items-end gap-3 max-w-3xl mx-auto">
            <textarea
              id="input"
              rows="1"
              placeholder="Ask FRIDAY anything..."
              class="flex-1 bg-[#1a1a2e] border border-gray-700 rounded-2xl px-4 py-3 text-white placeholder-gray-500 focus:border-cyan-500 focus:outline-none resize-none"
              style="min-height: 50px; max-height: 120px;"
              oninput="handleInput(this)"
              onkeydown="handleKeyDown(event)"
            >${state.input}</textarea>
            
            <button onclick="toggleVoice()" 
              class="w-14 h-14 rounded-full flex items-center justify-center text-2xl transition-all ${state.isListening 
                ? 'bg-red-500 animate-pulse shadow-[0_0_30px_rgba(239,68,68,0.5)]' 
                : 'bg-gradient-to-r from-cyan-600 to-blue-600 shadow-lg hover:shadow-cyan-500/30'}">
              ${state.isListening ? '🔴' : '🎤'}
            </button>
            
            <button onclick="sendMessage()" 
              ${!state.input.trim() || state.isStreaming ? 'disabled' : ''}
              class="w-14 h-14 rounded-full bg-gradient-to-r from-green-500 to-emerald-500 flex items-center justify-center text-xl shadow-lg ${!state.input.trim() || state.isStreaming ? 'opacity-50' : 'hover:shadow-green-500/30'}">
              ➤
            </button>
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    }

    function handleInput(el) {
      state.input = el.value;
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      render();
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    window.addEventListener('online', () => { state.online = true; render(); });
    window.addEventListener('offline', () => { state.online = false; render(); });

    // Debug on load
    console.log('FRIDAY: Starting...');
    console.log('FRIDAY: API_BASE =', API_BASE);
    console.log('FRIDAY: Origin =', window.location.origin);

    // Initial render
    render();
    
    // Test API connection
    fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: 'ping' }] })
    })
    .then(r => r.json())
    .then(d => console.log('FRIDAY: API Test OK:', d))
    .catch(e => console.error('FRIDAY: API Test FAILED:', e));
  </script>
</body>
</html>
