<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="FRIDAY - Your personal AI assistant">
  <title>FRIDAY - AI Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2300d4ff'/><circle cx='35' cy='40' r='8' fill='%230a0a0f'/><circle cx='65' cy='40' r='8' fill='%230a0a0f'/><path d='M30 65 Q50 80 70 65' stroke='%230a0a0f' stroke-width='6' fill='none'/></svg>">
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZSSURBWSIsCiAgInNob3J0X25hbWUiOiAiRlJJREFZIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGEwYTBmIiwKICAidGhlbWVfY29sb3IiOiAiIzAwZDRmZiIKfQ==">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .glass {
      background: rgba(15, 15, 25, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { scrollbar-width: none; }
    
    @media (max-width: 640px) {
      body { font-size: 14px; }
    }
    
    .message-container { max-height: calc(100vh - 200px); }
    
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: rgba(10, 10, 15, 0.95);
      border-top: 1px solid rgba(0, 212, 255, 0.1);
    }
    
    .mic-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    
    .mic-btn.listening {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      animation: pulse-mic 1s infinite;
    }
    
    .mic-btn.idle {
      background: linear-gradient(135deg, #0891b2, #0e7490);
    }
    
    @keyframes pulse-mic {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    }
    
    .send-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #00d4ff;
      border-radius: 50%;
      margin: 0 2px;
      animation: typing 1.4s infinite;
    }
    
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-6px); opacity: 1; }
    }
    
    .voice-bars {
      display: flex;
      gap: 3px;
      align-items: center;
      height: 24px;
    }
    
    .voice-bars span {
      width: 4px;
      background: #00d4ff;
      border-radius: 2px;
      animation: voice-wave 0.5s ease-in-out infinite;
    }
    
    @keyframes voice-wave {
      0%, 100% { height: 4px; }
      50% { height: 20px; }
    }
    
    .header-gradient {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(6, 182, 212, 0.05));
    }
  </style>
</head>
<body>
  <div id="app" class="h-full flex flex-col"></div>

  <script>
    // API Backend URL
    const API_BASE = 'https://friday-api-one.vercel.app';
    
    async function callAPI(messages) {
      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: messages })
        });
        const data = await res.json();
        if (data.error) {
          throw new Error(data.error);
        }
        return data;
      } catch (error) {
        throw new Error(error.message || 'API Error');
      }
    }

    let state = {
      messages: [],
      input: '',
      isListening: false,
      isLoading: false,
      isSpeaking: false,
      isOnline: navigator.onLine,
      totalTokens: parseInt(localStorage.getItem('friday_tokens') || '0'),
      lastError: null
    };

    let recognition = null;
    let synth = window.speechSynthesis;

    function render() {
      document.getElementById('app').innerHTML = `
        <header class="header-gradient glass px-4 py-3 flex items-center justify-between border-b border-cyan-900/30">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
            <div>
              <h1 class="text-lg font-semibold text-white">FRIDAY</h1>
              <p class="text-xs text-gray-400">AI Assistant</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="text-xs px-2 py-1 rounded-full bg-black/30">
              <span class="text-gray-400">Tokens:</span>
              <span class="text-cyan-400 font-mono ml-1">${state.totalTokens}</span>
            </div>
            <div class="flex items-center gap-1">
              <span class="w-2 h-2 rounded-full ${state.isOnline ? 'bg-green-500' : 'bg-red-500'}"></span>
              <span class="text-xs text-gray-400">${state.isOnline ? 'Online' : 'Offline'}</span>
            </div>
          </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-24 scrollbar-hide">
          ${state.messages.length === 0 ? `
            <div class="h-full flex flex-col items-center justify-center text-center px-4">
              <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-cyan-500/20 to-blue-600/20 flex items-center justify-center mb-4">
                <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
              </div>
              <h2 class="text-xl text-gray-200 font-medium">Hey Boss!</h2>
              <p class="text-sm text-gray-500 mt-2 max-w-xs">I'm FRIDAY, your AI assistant. Ask me anything or tap the mic to speak.</p>
              <div class="mt-6 flex flex-wrap justify-center gap-2">
                <span class="px-3 py-1.5 rounded-full bg-cyan-500/10 text-cyan-400 text-xs">🎤 Voice Enabled</span>
                <span class="px-3 py-1.5 rounded-full bg-green-500/10 text-green-400 text-xs">⚡ Fast Responses</span>
              </div>
            </div>
          ` : ''}

          ${state.messages.map((msg, idx) => `
            <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-3">
              <div class="max-w-[85%] sm:max-w-[70%] rounded-2xl px-4 py-3 ${msg.role === 'user' ? 'bg-gradient-to-r from-cyan-600 to-blue-600 text-white' : 'bg-[#1a1a2e] border border-gray-800'}">
                <p class="text-sm sm:text-base whitespace-pre-wrap break-words">${escapeHtml(msg.content)}</p>
              </div>
            </div>
          `).join('')}

          ${state.isLoading ? `
            <div class="flex justify-start mb-3">
              <div class="bg-[#1a1a2e] border border-gray-800 rounded-2xl px-4 py-3">
                <div class="typing-indicator">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          ` : ''}
        </main>

        ${state.lastError ? `
          <div class="mx-4 mb-2 p-3 rounded-xl bg-red-500/10 border border-red-500/30">
            <p class="text-xs text-red-400">${escapeHtml(state.lastError)}</p>
          </div>
        ` : ''}

        <div class="input-area">
          <div class="flex items-end gap-3 max-w-3xl mx-auto">
            <textarea
              id="input"
              rows="1"
              placeholder="Ask FRIDAY anything..."
              class="flex-1 bg-[#1a1a2e] border border-gray-700 rounded-2xl px-4 py-3 text-white placeholder-gray-500 focus:border-cyan-500 focus:outline-none resize-none"
              style="min-height: 50px; max-height: 120px;"
              oninput="handleInput(this)"
              onkeydown="handleKeyDown(event)"
            ></textarea>
            <button 
              onclick="toggleListening()" 
              class="mic-btn ${state.isListening ? 'listening' : 'idle'}"
              title="Voice input"
            >
              ${state.isListening ? `
                <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                  <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
              ` : `
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                </svg>
              `}
            </button>
            <button 
              onclick="sendMessage()" 
              class="send-btn ${!state.input.trim() || state.isLoading ? 'opacity-50' : ''}"
              ${!state.input.trim() || state.isLoading ? 'disabled' : ''}
              title="Send message"
            >
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
            </button>
          </div>
          
          ${state.isListening ? `
            <div class="mt-3 text-center">
              <div class="inline-flex items-center gap-3 px-4 py-2 rounded-full bg-red-500/10 border border-red-500/30">
                <div class="voice-bars">
                  <span style="animation-delay: 0s"></span>
                  <span style="animation-delay: 0.1s"></span>
                  <span style="animation-delay: 0.2s"></span>
                  <span style="animation-delay: 0.3s"></span>
                  <span style="animation-delay: 0.4s"></span>
                </div>
                <span class="text-sm text-red-400">Listening...</span>
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function handleInput(el) {
      state.input = el.value;
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      render();
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function toggleListening() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        state.lastError = 'Speech recognition not supported. Use Chrome browser.';
        render();
        return;
      }

      if (!recognition) {
        recognition = new SR();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        
        recognition.onresult = (e) => {
          state.input = Array.from(e.results).map(r => r[0].transcript).join('');
          const inputEl = document.getElementById('input');
          if (inputEl) {
            inputEl.value = state.input;
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
          }
        };
        
        recognition.onend = () => {
          state.isListening = false;
          render();
          if (state.input.trim()) {
            setTimeout(sendMessage, 300);
          }
        };
        
        recognition.onerror = (e) => {
          console.error('SR Error:', e.error);
          state.isListening = false;
          if (e.error === 'not-allowed') {
            state.lastError = 'Microphone access denied. Please allow microphone permissions.';
          }
          render();
        };
      }

      if (state.isListening) {
        recognition.stop();
        state.isListening = false;
      } else {
        state.lastError = null;
        try {
          recognition.start();
          state.isListening = true;
        } catch (e) {
          recognition = null;
          toggleListening();
        }
      }
      render();
    }

    function speak(text) {
      if (!synth) return;
      synth.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1.0;
      utterance.pitch = 1.1;
      synth.speak(utterance);
    }

    async function sendMessage() {
      if (!state.input.trim() || state.isLoading) return;
      
      state.lastError = null;
      const userMsg = { role: 'user', content: state.input };
      state.messages.push(userMsg);
      state.input = '';
      state.isLoading = true;
      render();

      try {
        const messages = [
          { role: 'system', content: SYSTEM_PROMPT },
          ...state.messages.map(m => ({ role: m.role, content: m.content }))
        ];
        
        const data = await callAPI(messages);
        const content = data.choices?.[0]?.message?.content || 'No response received.';
        
        state.totalTokens += (data.usage?.prompt_tokens || 0) + (data.usage?.completion_tokens || Math.ceil(content.length / 4));
        localStorage.setItem('friday_tokens', state.totalTokens.toString());
        
        state.messages.push({ role: 'assistant', content });
        
        // Auto voice response
        const textOnly = content.replace(/```[\s\S]*?```/g, '').trim();
        if (textOnly.length < 500) {
          speak(textOnly);
        }
      } catch (err) {
        console.error('API Error:', err);
        state.messages.push({ 
          role: 'assistant', 
          content: `Error: ${err.message}\n\nMake sure you're connected to the internet and try again.` 
        });
      } finally {
        state.isLoading = false;
        render();
      }
    }

    window.addEventListener('online', () => { state.isOnline = true; render(); });
    window.addEventListener('offline', () => { state.isOnline = false; render(); });

    render();
  </script>
</body>
</html>
